<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe code OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <header>
        <div class="wordmark">vibe <span>code.</span></div>
        <span class="status-pill">ONLINE</span>
    </header>

    <div class="grid">

        <!-- Clock -->
        <div class="panel c2r3" id="panel-clock">
            <div class="panel-label">Local Time</div>
            <div id="clock-time">00:00</div>
            <div id="clock-date">Loading...</div>
            <div class="clock-accent-line"></div>
        </div>

        <!-- Timer -->
        <div class="panel c2r3" id="panel-timer">
            <div class="panel-label">Focus Timer</div>
            <div id="timer-display">00:00</div>
            <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
            <div class="timer-btns">
                <button class="btn-sm primary" id="timer-start-btn" onclick="toggleTimer()">Start</button>
                <button class="btn-sm danger" onclick="resetTimer()">Reset</button>
            </div>
            <div class="preset-btns">
                <button class="btn-sm" onclick="setTimerPreset(25*60)">25m</button>
                <button class="btn-sm" onclick="setTimerPreset(45*60)">45m</button>
                <button class="btn-sm" onclick="setTimerPreset(60*60)">60m</button>
            </div>
        </div>

        <!-- AI Chat -->
        <div class="panel c5r7" id="panel-ai">
            <div class="ai-header">
                <button class="ai-tab-btn active" data-model="claude" onclick="switchAI('claude', this)">Claude</button>
                <button class="ai-tab-btn" data-model="gemini" onclick="switchAI('gemini', this)">Gemini</button>
                <button class="ai-tab-btn" data-model="gpt"    onclick="switchAI('gpt', this)">GPT-4o</button>
            </div>
            <div class="chat-body" id="chat-body"></div>
            <div class="chat-input-area">
                <textarea class="chat-input" id="chat-input" placeholder="Message the swarm…" rows="1"
                    onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" onclick="sendMessage()" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Tasks -->
        <div class="panel c3r4" id="panel-tasks">
            <div class="panel-label">Tasks</div>
            <div class="task-input-row">
                <input type="text" class="task-input" id="task-input" placeholder="Add a task…" onkeydown="handleTaskKey(event)">
                <button class="task-add-btn" onclick="addTask()">+</button>
            </div>
            <div class="task-list" id="task-list"></div>
        </div>

        <!-- Scratchpad -->
        <div class="panel c4r5" id="panel-editor">
            <div class="editor-toolbar">
                <span class="editor-label">Scratchpad</span>
                <span class="editor-wc" id="editor-wc">0 words</span>
            </div>
            <textarea id="editor-area" placeholder="Write something worth shipping…"></textarea>
        </div>

        <!-- GitHub Contributions -->
        <div class="panel c4r3" id="panel-github">
            <div class="git-header">
                <div class="panel-label" style="margin:0">Contributions</div>
                <div class="git-stat"><strong id="commit-count">—</strong> this week</div>
            </div>
            <div class="contrib-grid" id="contrib-grid"></div>
        </div>

        <!-- Spotify -->
        <div class="panel c3r5" id="panel-spotify">
            <iframe src="https://open.spotify.com/" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <!-- YouTube -->
        <div class="panel c5r4" id="panel-youtube">
            <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&loop=1&playlist=jfKfPfyJRdk"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

    </div>

    <!-- Dock -->
    <div class="dock">
        <div class="dock-item visible" id="dock-clock"   onclick="togglePanel('panel-clock',   'dock-clock')">⏰<div class="tooltip">Clock</div></div>
        <div class="dock-item visible" id="dock-timer"   onclick="togglePanel('panel-timer',   'dock-timer')">⏱<div class="tooltip">Timer</div></div>
        <div class="dock-item visible" id="dock-ai"      onclick="togglePanel('panel-ai',      'dock-ai')">🧠<div class="tooltip">AI Chat</div></div>
        <div class="dock-item visible" id="dock-tasks"   onclick="togglePanel('panel-tasks',   'dock-tasks')">✅<div class="tooltip">Tasks</div></div>
        <div class="dock-item visible" id="dock-editor"  onclick="togglePanel('panel-editor',  'dock-editor')">📝<div class="tooltip">Scratchpad</div></div>
        <div class="dock-item visible" id="dock-github"  onclick="togglePanel('panel-github',  'dock-github')">💻<div class="tooltip">Commits</div></div>
        <div class="dock-item visible" id="dock-spotify" onclick="togglePanel('panel-spotify', 'dock-spotify')">🎧<div class="tooltip">Spotify</div></div>
        <div class="dock-item visible" id="dock-youtube" onclick="togglePanel('panel-youtube', 'dock-youtube')">📺<div class="tooltip">Lofi</div></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
